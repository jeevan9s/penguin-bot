[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 38400
test_framework = unity

lib_deps =
    adafruit/Adafruit MCP23017 Arduino Library
    https://github.com/adafruit/Adafruit_LSM6DS.git
    
test_build_src = true

build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -I include
    -I test
    


